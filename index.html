<script>
const pen1 = document.getElementById('pen1');
const pen2 = document.getElementById('pen2');
const len1 = pen1.getTotalLength();
const len2 = pen2.getTotalLength();
const dur1 = 1200;
const dur2 = 1600;
const gap = 200;

function go() {
  pen1.style.strokeDasharray = len1;
  pen1.style.strokeDashoffset = len1;
  pen1.style.transition = 'none';
  pen2.style.strokeDasharray = len2;
  pen2.style.strokeDashoffset = len2;
  pen2.style.transition = 'none';

  requestAnimationFrame(() => {
    pen1.style.transition = 'stroke-dashoffset ' + dur1 + 'ms cubic-bezier(0.35, 0, 0.25, 1)';
    pen1.style.strokeDashoffset = '0';
    setTimeout(() => {
      pen2.style.transition = 'stroke-dashoffset ' + dur2 + 'ms cubic-bezier(0.35, 0, 0.25, 1)';
      pen2.style.strokeDashoffset = '0';
    }, dur1 * 0.7 + gap);
  });
}

function replay() {
  pen1.style.transition = 'none';
  pen2.style.transition = 'none';
  pen1.style.strokeDashoffset = len1;
  pen2.style.strokeDashoffset = len2;
  setTimeout(go, 50);
}

go();
</script>
